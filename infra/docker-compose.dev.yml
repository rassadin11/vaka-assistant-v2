name: personal-assistant-dev

services:
  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-dev-only-searxng-secret-change-before-production}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://127.0.0.1:8091/}
      FORCE_OWNERSHIP: "false"
    ports:
      - "127.0.0.1:8091:8080"
    volumes:
      - ./searxng/:/etc/searxng/:ro

  embeddings:
    # Heavy ML service: opt-in via `--profile ml` (CI and default dev-up skip it;
    # the Windows bind-mount default below breaks Linux runners otherwise).
    profiles: ["ml"]
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "--group", "embeddings", "uvicorn", "embeddings.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      HF_HOME: /cache
      # The repo mount contains a Windows .venv; keep the container venv apart.
      UV_PROJECT_ENVIRONMENT: /opt/venv
    ports:
      - "127.0.0.1:8090:8000"
    volumes:
      - ../:/app
      - ${HF_CACHE_HOST_PATH:-D:/hf-cache}:/cache
      - embeddings-uv-cache:/root/.cache/uv

  postgres:
    build:
      context: ./postgres
    image: personal-assistant-postgres:pg16-partman
    environment:
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: dev-local-only
      POSTGRES_DB: assistant
      PGBACKREST_REPO1_CIPHER_PASS: ${PGBACKREST_REPO1_CIPHER_PASS:-dev-only-pgbackrest-cipher-passphrase}
      PGBACKREST_REPO2_CIPHER_PASS: ${PGBACKREST_REPO2_CIPHER_PASS:-dev-only-pgbackrest-weekly-cipher-passphrase}
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.dev.conf"]
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - pgbackrest_repo:/var/lib/pgbackrest
      - pgbackrest_spool:/var/spool/pgbackrest
      - ./postgres/init-roles.sql:/docker-entrypoint-initdb.d/10-init-roles.sql:ro
      - ./postgres/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - ./postgres/postgresql.dev.conf:/etc/postgresql/postgresql.dev.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant -d assistant"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "6432:6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U assistant -d assistant"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  blackbox:
    image: prom/blackbox-exporter:latest
    # The image defaults to /etc/blackbox_exporter/config.yml; point it at our mount.
    command: ["--config.file=/config/blackbox.yml"]
    volumes:
      - ./blackbox/blackbox.yml:/config/blackbox.yml:ro

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
      - pgbouncer
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      TELEGRAM_ALERT_BOT_TOKEN: ${TELEGRAM_ALERT_BOT_TOKEN:-}
      TELEGRAM_ALERT_CHAT_ID: ${TELEGRAM_ALERT_CHAT_ID:-}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  redis-queue:
    image: redis:7.4.5-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./redis/redis-queue.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_queue_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis-cache:
    image: redis:7.4.5-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6380:6379"
    volumes:
      - ./redis/redis-cache.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  webapp:
    # Requires locally provisioned WEBAPP_INFISICAL_* credentials; kept opt-in
    # so the pre-existing dev stack and CI do not need Telegram secrets.
    profiles: ["webapp"]
    build:
      context: ..
    command: python -m core.secrets_entrypoint -- python -m webapp
    environment:
      INFISICAL_URL: http://infisical:8080
      INFISICAL_CLIENT_ID: ${WEBAPP_INFISICAL_CLIENT_ID:-}
      INFISICAL_CLIENT_SECRET: ${WEBAPP_INFISICAL_CLIENT_SECRET:-}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}
      INFISICAL_ENV: ${INFISICAL_ENV:-dev}
      DATABASE_URL: postgresql://app:dev-local-only@pgbouncer:6432/assistant
      REDIS_CACHE_URL: redis://redis-cache:6379/0
      REDIS_QUEUE_URL: redis://redis-queue:6379/0
      LOG_FORMAT: text
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      infisical:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from urllib.request import urlopen; urlopen('http://127.0.0.1:8001/app/healthz')"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  infisical-db:
    image: postgres:16.10-alpine
    environment:
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: infisical-dev-local-only
      POSTGRES_DB: infisical
    volumes:
      - infisical_postgres_data:/var/lib/postgresql/data
      - infisical_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical -d infisical"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  infisical-redis:
    image: redis:7.4.5-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - infisical_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  infisical:
    image: infisical/infisical:v0.161.12
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      ENCRYPTION_KEY: dev-local-only-infisical-key-000
      AUTH_SECRET: dev-local-only-infisical-auth-secret-not-production
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: infisical-dev-local-only
      POSTGRES_DB: infisical
      DB_CONNECTION_URI: postgres://infisical:infisical-dev-local-only@infisical-db:5432/infisical
      REDIS_URL: redis://infisical-redis:6379
      SITE_URL: http://localhost:8880
      TELEMETRY_ENABLED: "false"
      OTEL_TELEMETRY_COLLECTION_ENABLED: "false"
    ports:
      - "8880:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/api/status').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  postgres-restore:
    profiles: ["restore"]
    build:
      context: ./postgres
    image: personal-assistant-postgres:pg16-partman
    environment:
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: dev-local-only
      POSTGRES_DB: assistant
      PGBACKREST_REPO1_CIPHER_PASS: ${PGBACKREST_REPO1_CIPHER_PASS:-dev-only-pgbackrest-cipher-passphrase}
      PGBACKREST_REPO2_CIPHER_PASS: ${PGBACKREST_REPO2_CIPHER_PASS:-dev-only-pgbackrest-weekly-cipher-passphrase}
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.restore.conf"]
    ports:
      - "5433:5432"
    volumes:
      - postgres_restore_data:/var/lib/postgresql/data
      - pgbackrest_repo:/var/lib/pgbackrest:ro
      - pgbackrest_spool_restore:/var/spool/pgbackrest
      - ./postgres/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - ./postgres/postgresql.restore.conf:/etc/postgresql/postgresql.restore.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant -d assistant"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  embeddings-uv-cache:
  postgres_data:
  postgres_restore_data:
  pgbackrest_repo:
  pgbackrest_spool:
  pgbackrest_spool_restore:
  redis_queue_data:
  prometheus_data:
  grafana_data:
  infisical_postgres_data:
  infisical_backups:
  infisical_redis_data:
