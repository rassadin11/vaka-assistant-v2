apiVersion: 1

groups:
  - orgId: 1
    name: assistant
    folder: Alerts
    interval: 1m
    rules:
      - uid: interactive-queue-backlog
        title: InteractiveQueueBacklog
        condition: A
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              # max, not sum: every worker exports the same global queue depth.
              expr: max(queue_depth{queue="interactive"}) > 100
              instant: true
              interval: ""
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
        for: 5m
        # No traffic/worker metrics is not an incident by itself (TargetDown
        # covers unavailability) — avoid DatasourceNoData noise.
        noDataState: OK
        execErrState: Error
        annotations:
          summary: "InteractiveQueueBacklog: очередь interactive переполнена, значение {{ $values.A.Value }}"
        labels:
          severity: warning
      - uid: llm-429-ratio-high
        title: LLM429RatioHigh
        condition: A
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: (sum(rate(llm_requests_total{outcome="429"}[10m])) / sum(rate(llm_requests_total[10m])) > 0.2) and (sum(rate(llm_requests_total[10m])) > 0.05)
              instant: true
              interval: ""
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
        for: 10m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: "LLM429RatioHigh: высокая доля ответов 429, значение {{ $values.A.Value }}"
        labels:
          severity: warning
      - uid: daily-llm-cost-high
        title: DailyLLMCostHigh
        condition: A
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: sum(increase(llm_cost_rub_total[24h])) > 500
              instant: true
              interval: ""
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
        noDataState: OK
        execErrState: Error
        annotations:
          summary: "DailyLLMCostHigh: дневные расходы LLM выше порога, значение {{ $values.A.Value }}"
        labels:
          severity: critical
      - uid: target-down
        title: TargetDown
        condition: A
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              # "== bool": series value must be non-zero when firing — a plain
              # "== 0" filter returns value 0, which Grafana treats as Normal.
              expr: up == bool 0
              instant: true
              interval: ""
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
        for: 3m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "TargetDown: цель {{ $labels.instance }} недоступна, значение {{ $values.A.Value }}"
        labels:
          severity: critical
      - uid: service-probe-failed-critical
        title: ServiceProbeFailed
        condition: A
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: probe_success{instance=~"http://searxng:8080/healthz|postgres:5432"} == bool 0
              instant: true
              interval: ""
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
        for: 3m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "ServiceProbeFailed: {{ $labels.instance }} недоступен, значение {{ $values.A.Value }}"
        labels:
          severity: critical
      - uid: service-probe-failed-embeddings
        # Separate title: Grafana requires unique rule titles within a folder.
        title: EmbeddingsProbeFailed
        condition: A
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: probe_success{instance="http://embeddings:8000/healthz"} == bool 0
              instant: true
              interval: ""
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
        for: 3m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: "ServiceProbeFailed: embeddings недоступен, значение {{ $values.A.Value }}"
        labels:
          severity: warning
