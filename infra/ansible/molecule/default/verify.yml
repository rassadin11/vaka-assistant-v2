---
- name: Verify base and docker roles
  hosts: all
  gather_facts: false
  tasks:
    - name: Get deploy user account
      ansible.builtin.getent:
        database: passwd
        key: deploy

    - name: Verify deploy user exists
      ansible.builtin.assert:
        that:
          - "'deploy' in ansible_facts.getent_passwd"

    - name: Check sshd hardening drop-in
      ansible.builtin.stat:
        path: /etc/ssh/sshd_config.d/10-hardening.conf
      register: sshd_hardening_dropin

    - name: Verify sshd hardening drop-in exists
      ansible.builtin.assert:
        that:
          - sshd_hardening_dropin.stat.exists

    - name: Read sshd hardening drop-in
      ansible.builtin.slurp:
        src: /etc/ssh/sshd_config.d/10-hardening.conf
      register: sshd_hardening_contents

    - name: Verify sshd password authentication is disabled
      ansible.builtin.assert:
        that:
          - >-
            'PasswordAuthentication no' in
            (sshd_hardening_contents.content | b64decode)

    - name: Check deploy sudoers drop-in
      ansible.builtin.stat:
        path: /etc/sudoers.d/deploy
      register: deploy_sudoers_dropin

    - name: Verify deploy sudoers drop-in exists
      ansible.builtin.assert:
        that:
          - deploy_sudoers_dropin.stat.exists

    - name: Check Docker CLI is available
      ansible.builtin.command: docker --version
      register: docker_version_command
      changed_when: false
      failed_when: false

    - name: Verify Docker CLI is available
      ansible.builtin.assert:
        that:
          - docker_version_command.rc == 0

    - name: Check Docker Compose plugin is available
      ansible.builtin.command: docker compose version
      register: docker_compose_version_command
      changed_when: false
      failed_when: false

    - name: Verify Docker Compose plugin is available
      ansible.builtin.assert:
        that:
          - docker_compose_version_command.rc == 0

    - name: Get Docker group entry
      ansible.builtin.getent:
        database: group
        key: docker

    - name: Verify deploy user belongs to Docker group
      ansible.builtin.assert:
        that:
          - "'deploy' in ansible_facts.getent_group.docker[2]"

    - name: Check Docker daemon configuration
      ansible.builtin.stat:
        path: /etc/docker/daemon.json
      register: docker_daemon_config

    - name: Verify Docker daemon configuration exists
      ansible.builtin.assert:
        that:
          - docker_daemon_config.stat.exists

    - name: Read Docker daemon configuration
      ansible.builtin.slurp:
        src: /etc/docker/daemon.json
      register: docker_daemon_config_contents

    - name: Verify Docker daemon configuration is valid JSON
      ansible.builtin.assert:
        that:
          - >-
            (docker_daemon_config_contents.content | b64decode | from_json)
            is mapping

    - name: Check application directory
      ansible.builtin.stat:
        path: /opt/assistant
      register: application_directory

    - name: Verify application directory
      ansible.builtin.assert:
        that:
          - application_directory.stat.exists
          - application_directory.stat.isdir
          - application_directory.stat.pw_name == 'deploy'

    - name: Check assistant configuration directory
      ansible.builtin.stat:
        path: /etc/assistant
      register: assistant_configuration_directory

    - name: Verify assistant configuration directory
      ansible.builtin.assert:
        that:
          - assistant_configuration_directory.stat.exists
          - assistant_configuration_directory.stat.isdir
          - assistant_configuration_directory.stat.mode == '0750'

    - name: Check assistant systemd unit
      ansible.builtin.stat:
        path: /etc/systemd/system/assistant.service
      register: assistant_systemd_unit

    - name: Verify assistant systemd unit exists
      ansible.builtin.assert:
        that:
          - assistant_systemd_unit.stat.exists

    - name: Read assistant systemd unit
      ansible.builtin.slurp:
        src: /etc/systemd/system/assistant.service
      register: assistant_systemd_unit_contents

    - name: Verify assistant systemd unit compose command
      ansible.builtin.assert:
        that:
          - >-
            'ExecStart=/usr/bin/docker compose -f
            /opt/assistant/compose.prod.yml up -d' in
            (assistant_systemd_unit_contents.content | b64decode)

    - name: Check assistant service enable symlink
      ansible.builtin.stat:
        path: /etc/systemd/system/multi-user.target.wants/assistant.service
      register: assistant_service_wants_symlink

    - name: Verify assistant service is not enabled
      ansible.builtin.assert:
        that:
          - not assistant_service_wants_symlink.stat.exists
