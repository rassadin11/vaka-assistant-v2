---
- name: Install Docker repository dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
  tags:
    - docker
    - packages

- name: Create APT keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags:
    - docker
    - repository

- name: Download Docker repository signing key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false
  tags:
    - docker
    - repository

- name: Map host architecture to Docker APT architecture
  ansible.builtin.set_fact:
    docker_apt_arch: >-
      {{ {'x86_64': 'amd64', 'aarch64': 'arm64'}[ansible_architecture] }}
  tags:
    - docker
    - repository

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: true
  tags:
    - docker
    - repository

- name: Update APT package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags:
    - docker
    - packages

- name: Install Docker Engine and plugins
  ansible.builtin.apt:
    name:
      - "docker-ce={{ docker_version }}"
      - "docker-ce-cli={{ docker_version }}"
      - containerd.io
      - docker-buildx-plugin
      - "docker-compose-plugin={{ docker_compose_plugin_version }}"
    state: present
  tags:
    - docker
    - packages

- name: Configure Docker daemon
  ansible.builtin.copy:
    content: |
      {
        "log-driver": "json-file",
        "log-opts": { "max-size": "10m", "max-file": "3" },
        "live-restore": true
      }
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker
  tags:
    - docker
    - configuration

- name: Add deploy user to Docker group
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: docker
    append: true
  tags:
    - docker
    - deploy

- name: Ensure Docker service is enabled and started
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started
  when: >-
    ansible_virtualization_type not in
    ['docker', 'container', 'containerd', 'lxc', 'podman']
  tags:
    - docker
    - service
