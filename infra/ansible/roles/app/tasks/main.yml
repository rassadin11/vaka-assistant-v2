---
- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"
  tags:
    - app
    - directories

- name: Create assistant configuration directory
  ansible.builtin.file:
    path: /etc/assistant
    state: directory
    owner: root
    group: "{{ deploy_user }}"
    mode: "0750"
  tags:
    - app
    - directories

- name: Install production Compose file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../compose.prod.yml"
    dest: "{{ app_dir }}/compose.prod.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
  tags:
    - app
    - compose

- name: Create production configuration directory
  ansible.builtin.file:
    path: "{{ app_dir }}/config"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"
  tags:
    - app
    - directories

- name: Install shared application configuration directories
  vars:
    production_grafana_dir: "{{ playbook_dir }}/../../infra/prod/grafana"
  ansible.builtin.copy:
    src: "{{ item.src }}/"
    dest: "{{ app_dir }}/config/{{ item.dest }}/"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
    directory_mode: "0755"
  loop:
    - src: "{{ playbook_dir }}/../../infra/prod/caddy"
      dest: caddy
    - src: "{{ playbook_dir }}/../../infra/redis"
      dest: redis
    - src: "{{ playbook_dir }}/../../infra/pgbouncer"
      dest: pgbouncer
    - src: "{{ playbook_dir }}/../../infra/searxng"
      dest: searxng
    - src: "{{ playbook_dir }}/../../infra/blackbox"
      dest: blackbox
    - src: "{{ playbook_dir }}/../../infra/prod/prometheus"
      dest: prometheus
    - src: "{{ playbook_dir }}/../../infra/grafana/provisioning/alerting"
      dest: grafana/provisioning/alerting
    - src: "{{ playbook_dir }}/../../infra/grafana/provisioning/dashboards"
      dest: grafana/provisioning/dashboards
    - src: "{{ production_grafana_dir }}/provisioning/datasources"
      dest: grafana/provisioning/datasources
  tags:
    - app
    - configuration

- name: Create production PostgreSQL configuration directory
  ansible.builtin.file:
    path: "{{ app_dir }}/config/postgres"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"
  tags:
    - app
    - configuration

- name: Install production PostgreSQL configuration files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ app_dir }}/config/postgres/{{ item.dest }}"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
  loop:
    - src: "{{ playbook_dir }}/../../infra/postgres/init-roles.sql"
      dest: init-roles.sql
    - src: "{{ playbook_dir }}/../../infra/postgres/pgbackrest.conf"
      dest: pgbackrest.conf
    - src: "{{ playbook_dir }}/../../infra/prod/postgres/postgresql.prod.conf"
      dest: postgresql.prod.conf
  tags:
    - app
    - configuration

- name: Install bootstrap environment template
  ansible.builtin.template:
    src: bootstrap.env.j2
    dest: /etc/assistant/bootstrap.env
    owner: root
    group: "{{ deploy_user }}"
    mode: "0640"
    force: false
  tags:
    - app
    - configuration

- name: Install infrastructure environment template
  ansible.builtin.template:
    src: infra.env.j2
    dest: /etc/assistant/infra.env
    owner: root
    group: "{{ deploy_user }}"
    mode: "0640"
    force: false
  tags:
    - app
    - configuration

- name: Install deployment image environment template
  ansible.builtin.template:
    src: deploy.env.j2
    dest: /etc/assistant/deploy.env
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0640"
    force: false
  tags:
    - app
    - configuration

- name: Install webapp environment template
  ansible.builtin.template:
    src: webapp.env.j2
    dest: /etc/assistant/webapp.env
    owner: root
    group: "{{ deploy_user }}"
    mode: "0640"
    force: false
  tags:
    - app
    - configuration

- name: Link Compose interpolation environment file
  ansible.builtin.file:
    src: /etc/assistant/infra.env
    dest: "{{ app_dir }}/.env"
    state: link
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
  tags:
    - app
    - configuration

- name: Install assistant systemd unit
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Assistant application (docker compose)
      Requires=docker.service
      After=docker.service network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory={{ app_dir }}
      User={{ deploy_user }}
      EnvironmentFile=-/etc/assistant/deploy.env
      ExecStart=/usr/bin/docker compose -f {{ app_dir }}/compose.prod.yml up -d
      ExecStop=/usr/bin/docker compose -f {{ app_dir }}/compose.prod.yml down

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/assistant.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  tags:
    - app
    - systemd
