name: Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      postgres: ${{ steps.filter.outputs.postgres }}
      embeddings: ${{ steps.filter.outputs.embeddings }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            postgres:
              - 'infra/postgres/**'
            embeddings:
              - 'Dockerfile.embeddings'
              - 'embeddings/**'
              - 'pyproject.toml'
              - 'uv.lock'

  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/rassadin11/vaka-assistant-v2:latest
            ghcr.io/rassadin11/vaka-assistant-v2:sha-${{ github.sha }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
      - name: Smoke test image
        run: |
          docker pull ghcr.io/rassadin11/vaka-assistant-v2:sha-${{ github.sha }}
          docker run --rm ghcr.io/rassadin11/vaka-assistant-v2:sha-${{ github.sha }} python -c "import gateway, worker, core, tools"

  postgres:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.postgres == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: infra/postgres
          push: true
          tags: |
            ghcr.io/rassadin11/vaka-assistant-v2-postgres:latest
            ghcr.io/rassadin11/vaka-assistant-v2-postgres:sha-${{ github.sha }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,mode=max,scope=postgres

  embeddings:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.embeddings == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.embeddings
          push: true
          tags: |
            ghcr.io/rassadin11/vaka-assistant-v2-embeddings:latest
            ghcr.io/rassadin11/vaka-assistant-v2-embeddings:sha-${{ github.sha }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=embeddings
          cache-to: type=gha,mode=max,scope=embeddings
