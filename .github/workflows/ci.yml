name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run pytest -v

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - name: Validate development Compose configuration
        run: docker compose -f infra/docker-compose.dev.yml config -q
      - name: Validate production Compose configuration
        run: |
          mkdir -p /tmp/assistant-compose-env
          touch /tmp/assistant-compose-env/bootstrap.env
          touch /tmp/assistant-compose-env/infra.env
          touch /tmp/assistant-compose-env/pgbouncer-userlist.txt
          cat > /tmp/assistant-compose-env/.env <<'EOF'
          POSTGRES_PASSWORD=ci-placeholder
          PGBACKREST_REPO1_CIPHER_PASS=ci-placeholder
          PGBACKREST_REPO2_CIPHER_PASS=ci-placeholder
          INFISICAL_DB_PASSWORD=ci-placeholder
          INFISICAL_ENCRYPTION_KEY=ci-placeholder
          INFISICAL_AUTH_SECRET=ci-placeholder
          INFISICAL_DB_CONNECTION_URI=postgres://ci-placeholder
          SEARXNG_SECRET=ci-placeholder
          GF_SECURITY_ADMIN_PASSWORD=ci-placeholder
          GRAFANA_METRICS_RO_PASSWORD=ci-placeholder
          EOF
          ENV_FILE_DIR=/tmp/assistant-compose-env \
            docker compose --env-file /tmp/assistant-compose-env/.env -f infra/compose.prod.yml config -q
      - run: docker compose -f infra/docker-compose.dev.yml up -d --wait
      - run: uv run alembic upgrade head
      - run: uv run pytest -v -m integration
      - if: always()
        run: docker compose -f infra/docker-compose.dev.yml down -v

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: >
          docker run --rm -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:latest
          detect --source /repo --no-banner

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: personal-assistant:ci
